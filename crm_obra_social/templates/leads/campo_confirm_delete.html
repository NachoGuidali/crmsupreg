{% extends "base.html" %}
{% block title %}Eliminar campo{% endblock %}
{% block content %}
<div class="card border-0 shadow-sm" style="max-width:480px;margin:60px auto;">
  <div class="card-body text-center p-4">
    <i class="bi bi-exclamation-triangle text-danger" style="font-size:2.5rem;"></i>
    <h5 class="mt-3">¿Eliminar campo "{{ object.nombre }}"?</h5>
    <p class="text-muted small">Los valores guardados en leads y clientes para este campo NO se eliminarán de sus registros.</p>
    <form method="post" class="d-flex gap-2 justify-content-center mt-3">
      {% csrf_token %}
      <button type="submit" class="btn btn-danger">Sí, eliminar</button>
      <a href="{% url 'leads:campos' %}" class="btn btn-outline-secondary">Cancelar</a>
    </form>
  </div>
</div>
{% endblock %}
