{% extends "base.html" %}
{% block title %}Eliminar cliente{% endblock %}
{% block content %}
<div class="card border-0 shadow-sm" style="max-width:480px;margin:60px auto;">
  <div class="card-body text-center p-4">
    <i class="bi bi-exclamation-triangle text-danger" style="font-size:2.5rem;"></i>
    <h5 class="mt-3">¿Eliminar a {{ object.nombre_completo }}?</h5>
    <p class="text-muted small">Esta acción no se puede deshacer.</p>
    <form method="post" class="d-flex gap-2 justify-content-center mt-3">
      {% csrf_token %}
      <button type="submit" class="btn btn-danger">Sí, eliminar</button>
      <a href="{% url 'clientes:detail' object.pk %}" class="btn btn-outline-secondary">Cancelar</a>
    </form>
  </div>
</div>
{% endblock %}
