{% extends "base.html" %}
{% block title %}Reporte de mensajes{% endblock %}

{% block content %}
<h4 class="fw-bold mb-4"><i class="bi bi-chat-dots text-primary"></i> Reporte de mensajes WhatsApp</h4>
<form method="get" class="card border-0 shadow-sm p-3 mb-4" style="max-width:400px;">
  <div class="row g-2">
    <div class="col"><label class="form-label small">Desde</label><input type="date" name="desde" class="form-control form-control-sm" value="{{ desde|default:'' }}"></div>
    <div class="col"><label class="form-label small">Hasta</label><input type="date" name="hasta" class="form-control form-control-sm" value="{{ hasta|default:'' }}"></div>
    <div class="col-12"><button type="submit" class="btn btn-primary btn-sm w-100">Filtrar</button></div>
  </div>
</form>
<div class="row g-3" style="max-width:400px;">
  <div class="col-6"><div class="card border-0 shadow-sm text-center p-4"><div class="text-muted small">Enviados</div><div class="fs-2 fw-bold text-primary">{{ enviados }}</div></div></div>
  <div class="col-6"><div class="card border-0 shadow-sm text-center p-4"><div class="text-muted small">Recibidos</div><div class="fs-2 fw-bold text-success">{{ recibidos }}</div></div></div>
</div>
{% endblock %}
