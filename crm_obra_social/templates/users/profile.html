{% extends "base.html" %}
{% block title %}Mi perfil{% endblock %}

{% block content %}
<h4 class="fw-bold mb-4"><i class="bi bi-person-circle text-primary"></i> Mi perfil</h4>
<div class="card border-0 shadow-sm" style="max-width:480px;">
  <div class="card-body">
    <form method="post" enctype="multipart/form-data">
      {% csrf_token %}
      {% if user.avatar %}
      <div class="text-center mb-3"><img src="{{ user.avatar.url }}" class="rounded-circle" width="80" height="80" alt="avatar"></div>
      {% endif %}
      {% for field in form %}
      <div class="mb-3">
        <label class="form-label fw-semibold">{{ field.label }}</label>
        {{ field }}
        {% if field.errors %}<div class="invalid-feedback d-block">{{ field.errors.0 }}</div>{% endif %}
      </div>
      {% endfor %}
      <button type="submit" class="btn btn-primary">Guardar cambios</button>
    </form>
  </div>
</div>
{% endblock %}
