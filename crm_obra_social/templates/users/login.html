<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Iniciar sesión — CRM Obra Social</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
  <link rel="stylesheet" href="/static/css/main.css">
</head>
<body class="bg-light">
<div class="min-vh-100 d-flex align-items-center justify-content-center">
  <div class="card shadow-sm" style="width:100%;max-width:420px;">
    <div class="card-body p-4">
      <div class="text-center mb-4">
        <i class="bi bi-heart-pulse-fill text-primary" style="font-size:2.5rem;"></i>
        <h4 class="mt-2 fw-bold">CRM Obra Social</h4>
        <p class="text-muted small">Ingresá con tu usuario y contraseña</p>
      </div>
      <form method="post" novalidate>
        {% csrf_token %}
        {% for field in form %}
        <div class="mb-3">
          <label class="form-label">{{ field.label }}</label>
          {{ field }}
          {% if field.errors %}
          <div class="invalid-feedback d-block">{{ field.errors.0 }}</div>
          {% endif %}
        </div>
        {% endfor %}
        {% if form.non_field_errors %}
        <div class="alert alert-danger">{{ form.non_field_errors.0 }}</div>
        {% endif %}
        <button type="submit" class="btn btn-primary w-100 mt-2">
          <i class="bi bi-box-arrow-in-right"></i> Ingresar
        </button>
      </form>
    </div>
  </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
